name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configuration Git
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. Vérification de sécurité pour le Token (sans l'afficher)
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ ERREUR : Le secret HF_TOKEN est vide ou mal configuré dans GitHub !"
            exit 1
          fi

          # 3. Tentative de synchronisation directe
          # ⚠️ REMPLACE BIEN "TON_PSEUDO" et "NOM_DE_TON_SPACE" ci-dessous :
          echo "🚀 Début de la synchronisation vers Hugging Face..."
          git push --force https://x:$HF_TOKEN@huggingface.co/spaces/TON_PSEUDO/NOM_DE_TON_SPACE main:main